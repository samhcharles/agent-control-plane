name: Proposal
description: Suggest a new agent, behavior change, or standard
labels: [proposal]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What situation does this address? What's currently missing or wrong?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should exist or change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about?
